<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUILD — Project Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --surface-2: #f5f4f0;
    --text-primary: #111111;
    --text-secondary: #666666;
    --text-tertiary: #999999;
    --border: #e8e6e1;
    --border-light: #f0eee9;
    --accent-green: #2d5a27;
    --accent-green-light: #e8f2e6;
    --accent-wood: #8b6914;
    --accent-wood-light: #f5f0e0;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
    --radius: 8px;
    --radius-lg: 16px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'Inter', 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg); color: var(--text-primary);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
  }

  .global-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-light);
  }
  .header-inner {
    max-width: 1440px; margin: 0 auto; padding: 0 48px;
    height: 64px; display: flex; align-items: center;
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand-logo { font-size: 11px; letter-spacing: 4px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; }
  .brand-divider { width: 1px; height: 20px; background: var(--border); }
  .brand-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }

  .nav-bar { background: var(--surface); border-bottom: 1px solid var(--border-light); }
  .nav-inner { max-width: 1440px; margin: 0 auto; padding: 0 48px; display: flex; }
  .nav-tab {
    padding: 16px 20px; font-size: 13px; font-weight: 500; color: var(--text-tertiary);
    cursor: pointer; border-bottom: 2px solid transparent; transition: var(--transition);
    user-select: none;
  }
  .nav-tab:hover { color: var(--text-secondary); }
  .nav-tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
  .nav-tab .count {
    display: inline-block; background: var(--surface-2); font-size: 10px;
    padding: 1px 6px; border-radius: 10px; margin-left: 6px; color: var(--text-tertiary);
  }

  .content-area { max-width: 1440px; margin: 0 auto; padding: 32px 48px 80px; }
  .view { display: none; }
  .view.active { display: block; }
  .section-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
  .section-desc { font-size: 13px; color: var(--text-tertiary); margin-bottom: 28px; }

  /* === PROJECT CARDS === */
  .project-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px;
  }
  .project-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
    overflow: hidden; transition: var(--transition);
    cursor: pointer; text-decoration: none; color: inherit; display: block;
  }
  .project-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
  .project-card.disabled { opacity: 0.55; cursor: default; }
  .project-card.disabled:hover { box-shadow: var(--shadow-sm); transform: none; }

  .project-visual {
    height: 180px; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .project-visual svg { width: 100%; height: 100%; }
  .project-badge {
    position: absolute; top: 14px; left: 14px;
    font-size: 10px; font-weight: 600; padding: 4px 12px; border-radius: 100px;
  }
  .project-badge.active { background: var(--accent-green-light); color: var(--accent-green); }
  .project-badge.completed { background: var(--surface-2); color: var(--text-tertiary); }
  .project-badge.planning { background: #e3f2fd; color: #1565c0; }

  .project-body { padding: 20px 24px; }
  .project-body h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
  .project-body .pid { font-size: 12px; color: var(--text-tertiary); margin-bottom: 12px; }
  .project-stats { display: flex; gap: 20px; }
  .pstat .pval { font-size: 18px; font-weight: 700; }
  .pstat .plabel { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; }

  .project-footer {
    padding: 12px 24px; border-top: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--text-tertiary);
  }
  .avatars { display: flex; }
  .avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--surface-2); border: 2px solid var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: var(--text-secondary);
    margin-left: -6px;
  }
  .avatar:first-child { margin-left: 0; }

  /* === GLOBAL HARDWARE === */
  .hw-search {
    width: 100%; padding: 10px 18px; border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 13px; background: var(--surface);
    font-family: inherit; margin-bottom: 16px;
  }
  .hw-search:focus { outline: none; border-color: var(--text-secondary); }
  .filter-row { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-chip {
    padding: 7px 18px; border-radius: 100px; border: 1px solid var(--border);
    background: var(--surface); font-size: 12px; font-weight: 500;
    cursor: pointer; transition: var(--transition); font-family: inherit; color: var(--text-secondary);
  }
  .filter-chip:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .filter-chip.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

  .hw-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
  }
  .hw-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
    overflow: hidden; transition: var(--transition);
  }
  .hw-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .hw-card-visual {
    height: 140px; background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hw-card-visual img { width: 100%; height: 100%; object-fit: contain; padding: 12px; }
  .hw-card-visual .hw-ptag {
    position: absolute; bottom: 8px; right: 8px;
    font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 4px;
    background: rgba(0,0,0,0.6); color: #fff;
  }
  .hw-card-body { padding: 14px 18px; }
  .hw-card-body h4 { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .hw-card-body .hw-meta { font-size: 11px; color: var(--text-tertiary); line-height: 1.6; }

  /* === FURNITURE === */
  .furniture-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px;
  }
  .furn-card {
    background: var(--surface); border-radius: var(--radius-lg);
    border: 1px solid var(--border-light); box-shadow: var(--shadow-sm);
    overflow: hidden; transition: var(--transition); cursor: pointer;
  }
  .furn-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
  .furn-card-img {
    height: 220px; background: var(--surface-2); overflow: hidden;
    position: relative;
  }
  .furn-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .furn-card-img .furn-tag {
    position: absolute; top: 12px; left: 12px;
    font-size: 10px; font-weight: 600; padding: 4px 12px; border-radius: 100px;
    background: var(--accent-wood-light); color: var(--accent-wood);
  }
  .furn-card-body { padding: 20px 24px; }
  .furn-card-body h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
  .furn-card-body .furn-sub { font-size: 12px; color: var(--text-tertiary); margin-bottom: 14px; }
  .furn-variants {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .furn-variant-chip {
    font-size: 10px; padding: 3px 10px; border-radius: 100px;
    background: var(--surface-2); color: var(--text-secondary); font-weight: 500;
  }
  .furn-card-stats { display: flex; gap: 20px; }
  .furn-card-footer {
    padding: 12px 24px; border-top: 1px solid var(--border-light);
    font-size: 11px; color: var(--text-tertiary);
    display: flex; justify-content: space-between;
  }

  /* Furniture detail modal */
  .furn-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .furn-modal-overlay.open { display: flex; }
  .furn-modal {
    background: var(--surface); border-radius: var(--radius-lg);
    max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .furn-modal-header {
    padding: 28px 32px 0; display: flex; justify-content: space-between; align-items: flex-start;
  }
  .furn-modal-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .furn-modal-close {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
    flex-shrink: 0;
  }
  .furn-modal-close:hover { background: var(--surface-2); }
  .furn-modal-body { padding: 20px 32px 32px; }
  .furn-modal-gallery {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;
    margin-bottom: 24px;
  }
  .furn-modal-gallery img {
    width: 100%; height: 160px; object-fit: cover; border-radius: var(--radius);
    border: 1px solid var(--border-light);
  }
  .furn-detail-section { margin-bottom: 20px; }
  .furn-detail-section h4 {
    font-size: 12px; font-weight: 600; color: var(--text-tertiary);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  }
  .furn-detail-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .furn-detail-table td {
    padding: 8px 12px; border-bottom: 1px solid var(--border-light);
  }
  .furn-detail-table td:first-child {
    font-weight: 600; color: var(--text-secondary); width: 140px;
  }

  @media (max-width: 768px) {
    .header-inner, .nav-inner, .content-area { padding-left: 20px; padding-right: 20px; }
    .project-grid, .hw-grid, .furniture-grid { grid-template-columns: 1fr; }
    .furn-modal { margin: 12px; }
  }
</style>
</head>

// Tab switching
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
  });
});

// Projects
function renderProjects() {
  document.getElementById('projectGrid').innerHTML = projects.map(p => {
    const label = {active:'設計中',completed:'完了',planning:'計画中'}[p.status];
    const tag = p.path ? `<a href="${p.path}" class="project-card">` : `<div class="project-card disabled">`;
    const endTag = p.path ? '</a>' : '</div>';
    return `${tag}
      <div class="project-visual" style="background:${p.color}">
        <svg viewBox="0 0 400 200" style="opacity:0.25">
          <rect x="80" y="30" width="240" height="140" rx="4" fill="none" stroke="#333" stroke-width="1.5"/>
          <line x1="80" y1="80" x2="320" y2="80" stroke="#333" stroke-width="1"/>
          <line x1="80" y1="120" x2="320" y2="120" stroke="#333" stroke-width="1"/>
          <line x1="200" y1="80" x2="200" y2="170" stroke="#333" stroke-width="1"/>
          <circle cx="110" cy="175" r="8" fill="none" stroke="#333" stroke-width="1.5"/>
          <circle cx="290" cy="175" r="8" fill="none" stroke="#333" stroke-width="1.5"/>
        </svg>
        <span class="project-badge ${p.status}">${label}</span>
      </div>
      <div class="project-body">
        <h3>${p.name}</h3>
        <div class="pid">${p.pid} ・ ${p.client}</div>
        <div class="project-stats">
          <div class="pstat"><div class="pval">${p.stats.hardware}</div><div class="plabel">金物</div></div>
          <div class="pstat"><div class="pval">${p.stats.knowledge}</div><div class="plabel">ナレッジ</div></div>
          <div class="pstat"><div class="pval">${p.stats.bom}</div><div class="plabel">原価</div></div>
        </div>
      </div>
      <div class="project-footer">
        <div class="avatars">${p.members.map(m=>`<div class="avatar">${m[0]}</div>`).join('')}</div>
        <span>更新: ${p.updated}</span>
      </div>
    ${endTag}`;
  }).join('');
  document.getElementById('projectCount').textContent = projects.length;
}

// Furniture
function renderFurniture() {
  document.getElementById('furnitureGrid').innerHTML = furnitureProducts.map(f => {
    const imgHtml = f.thumbnail
      ? `<img src="${f.thumbnail}" onerror="this.style.display='none'">`
      : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:14px">写真準備中</div>`;
    return `
    <div class="furn-card" onclick="openFurnModal('${f.id}')">
      <div class="furn-card-img">
        ${imgHtml}
        <span class="furn-tag">${f.cases} 案件で導入</span>
      </div>
      <div class="furn-card-body">
        <h3>${f.name}</h3>
        <div class="furn-sub">${f.sub}</div>
        <div class="furn-variants">
          ${f.variants.map(v => `<span class="furn-variant-chip">${v}</span>`).join('')}
        </div>
        <div class="furn-card-stats">
          <div class="pstat"><div class="pval">${f.variants.length}</div><div class="plabel">バリエーション</div></div>
          <div class="pstat"><div class="pval">${f.cases}</div><div class="plabel">導入実績</div></div>
          <div class="pstat"><div class="pval">${f.photos.length}</div><div class="plabel">写真</div></div>
        </div>
      </div>
      <div class="furn-card-footer">
        <span>${f.specs.material}</span>
        <span>${f.specs.finish}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('furnitureCount').textContent = furnitureProducts.length;
}

function openFurnModal(id) {
  const f = furnitureProducts.find(p => p.id === id);
  if (!f) return;
  document.getElementById('furnModalTitle').textContent = f.name;
  document.getElementById('furnModalSub').textContent = f.sub;

  let html = '';

  // Gallery
  if (f.photos.length > 0) {
    html += `<div class="furn-modal-gallery">
      ${f.photos.map(p => `<img src="${p}" onerror="this.style.display='none'">`).join('')}
    </div>`;
  }

  // Specs
  html += `<div class="furn-detail-section">
    <h4>仕様</h4>
    <table class="furn-detail-table">
      <tr><td>素材</td><td>${f.specs.material}</td></tr>
      <tr><td>仕上げ</td><td>${f.specs.finish}</td></tr>
      <tr><td>重量</td><td>${f.specs.weight}</td></tr>
      <tr><td>備考</td><td>${f.specs.note}</td></tr>
    </table>
  </div>`;

  // Variants
  html += `<div class="furn-detail-section">
    <h4>バリエーション</h4>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${f.variants.map(v => `<span class="furn-variant-chip" style="font-size:12px;padding:6px 14px">${v}</span>`).join('')}
    </div>
  </div>`;

  // Records
  html += `<div class="furn-detail-section">
    <h4>導入実績</h4>
    <table class="furn-detail-table">
      <tr style="font-weight:600;color:var(--text-tertiary);font-size:11px;text-transform:uppercase;letter-spacing:1px">
        <td>案件</td><td>形態</td><td>場所</td>
      </tr>
      ${f.records.map(r => `<tr><td style="font-weight:500">${r.project}</td><td>${r.type}</td><td>${r.location}</td></tr>`).join('')}
    </table>
  </div>`;

  document.getElementById('furnModalBody').innerHTML = html;
  document.getElementById('furnModal').classList.add('open');
}

function closeFurnModal() {
  document.getElementById('furnModal').classList.remove('open');
}

document.getElementById('furnModal').addEventListener('click', function(e) {
  if (e.target === this) closeFurnModal();
});

// Global Hardware
let gwFilter = 'すべて';
function renderGlobalHw() {
  const search = document.getElementById('globalHwSearch').value.toLowerCase();
  const cats = ['すべて', ...new Set(globalHardware.map(h=>h.cat))];
  const pids = ['全案件', ...new Set(globalHardware.map(h=>h.pid))];

  document.getElementById('globalFilterRow').innerHTML =
    cats.map(c=>`<button class="filter-chip ${c===gwFilter?'active':''}" onclick="gwFilter='${c}';renderGlobalHw()">${c}</button>`).join('') +
    '<span style="width:1px;height:24px;background:var(--border);margin:0 4px"></span>' +
    pids.map(p=>`<button class="filter-chip ${p===gwFilter?'active':''}" onclick="gwFilter='${p}';renderGlobalHw()">${p}</button>`).join('');

  const filtered = globalHardware.filter(h=>{
    if(gwFilter!=='すべて' && gwFilter!=='全案件' && h.cat!==gwFilter && h.pid!==gwFilter) return false;
    if(search && !(h.name+h.code+h.maker+h.project+h.cat).toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('globalHwCount').textContent = globalHardware.length;
  document.getElementById('globalHwGrid').innerHTML = filtered.map(h=>`
    <div class="hw-card">
      <div class="hw-card-visual">
        ${h.img?`<img src="${h.img}" onerror="this.style.display='none'">`:'<span style="font-size:32px;color:var(--text-tertiary)">&#9881;</span>'}
        <span class="hw-ptag">${h.pid} ${h.project}</span>
      </div>
      <div class="hw-card-body">
        <h4>${h.name}</h4>
        <div class="hw-meta">${h.code||'-'} / ${h.maker||'-'}${h.price?' / ¥'+h.price.toLocaleString():''}</div>
      </div>
    </div>
  `).join('') || '<div style="text-align:center;color:var(--text-tertiary);padding:40px">該当なし</div>';
}

document.addEventListener('DOMContentLoaded', () => {
  renderProjects();
  renderFurniture();
  renderGlobalHw();
});
</script>
