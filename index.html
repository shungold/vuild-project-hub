<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUILD — Project Hub</title>
<link rel="stylesheet" href="style.css?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="global-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-logo">VUILD</span>
      <div class="brand-divider"></div>
      <span class="brand-title">Project Hub</span>
    </div>
    <span id="sync-badge" class="sync-badge" style="display:none"></span>
  </div>
</header>

<nav class="nav-bar">
  <div class="nav-inner">
    <button class="nav-tab active" data-tab="projects">案件 <span class="count" id="count-projects">0</span></button>
    <button class="nav-tab" data-tab="furniture">VUILD furniture <span class="count" id="count-furniture">0</span></button>
    <button class="nav-tab" data-tab="materials">素材・金物 <span class="count" id="count-materials">0</span></button>
  </div>
</nav>

<main class="content-area">

  <!-- ============ 案件タブ ============ -->
  <section class="view active" id="view-projects">
    <h1 class="section-title">案件リスト</h1>
    <p class="section-desc">案件をクリックすると、写真・使用素材・ナレッジ・コストを確認できます</p>
    <div id="project-filters"></div>
    <div class="card-grid project-grid" id="project-grid"></div>
  </section>

  <!-- ============ furnitureタブ ============ -->
  <section class="view" id="view-furniture">
    <h1 class="section-title">VUILD furniture</h1>
    <p class="section-desc">案件横断で導入してきた家具プロダクト — シリーズ別カタログ</p>
    <div id="furniture-filters"></div>
    <div id="furniture-grid"></div>
  </section>

  <!-- ============ 素材・金物タブ ============ -->
  <section class="view" id="view-materials">
    <h1 class="section-title">素材・金物</h1>
    <p class="section-desc">全案件で使用した素材・金物を横断検索</p>
    <input type="text" class="search-input" id="material-search" placeholder="品名・品番・メーカーで検索...">
    <div id="material-filters"></div>

    <div id="materials-section-hw" style="margin-bottom:48px">
      <h2 class="sub-title">什器系金物</h2>
      <div class="card-grid material-grid" id="material-grid-hw"></div>
    </div>

    <div id="materials-section-arch">
      <h2 class="sub-title">建築系素材</h2>
      <div class="card-grid material-grid" id="material-grid-arch"></div>
      <p class="empty-state" id="arch-empty" style="display:none">建築系素材はまだ登録されていません</p>
    </div>

    <div style="margin-top:48px">
      <h2 class="sub-title">検討中の候補</h2>
      <div class="card-grid material-grid" id="candidate-grid"></div>
    </div>
  </section>

</main>

<script src="common.js?v=2"></script>
<script>
// Portal is at root level
DataLoader.basePath = '';

// ============ State ============
let projectFilter = 'すべて';
let furnitureFilter = 'すべて';
let materialTypeFilter = 'すべて';

// ============ Projects ============
async function renderProjects() {
  const data = await DataLoader.load('projects');
  const projects = data.projects || data;
  document.getElementById('count-projects').textContent = projects.length;

  // Filter chips
  const categories = ['すべて', ...new Set(projects.map(p => p.category).filter(Boolean))];
  document.getElementById('project-filters').innerHTML = `
    <div class="filter-chips">
      ${categories.map(c => `<button class="chip${c === projectFilter ? ' active' : ''}"
        onclick="projectFilter='${c}';renderProjects()">${c}</button>`).join('')}
    </div>`;

  // Filter
  const filtered = projectFilter === 'すべて'
    ? projects
    : projects.filter(p => p.category === projectFilter);

  // Render cards
  document.getElementById('project-grid').innerHTML = filtered.map(p => {
    const status = getStatusLabel(p.status);
    const heroImg = (p.hero_photos && p.hero_photos[0]);
    const thumbHtml = heroImg
      ? `<img src="${heroImg}" alt="${esc(p.name)}" loading="lazy">`
      : `<div class="thumb-placeholder"><span>${esc(p.pid || '')}</span></div>`;
    return `
      <a href="projects/${p.id}/index.html" class="card project-card">
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <span class="badge badge-${p.status}">${status}</span>
          <h3>${esc(p.name)}</h3>
          <p class="card-sub">${esc(p.pid)} — ${esc(p.client)}</p>
          ${(p.cost_overview && p.cost_overview.total) ? '<div class="card-cost">' + formatPrice(p.cost_overview.total) + '</div>' : ''}
          <div class="card-tags">
            ${(p.tags || []).slice(0, 3).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
          </div>
        </div>
        <div class="card-footer">
          <div class="avatars">${(p.team || []).map(m =>
            `<span class="avatar" title="${esc(m.name)}">${esc(m.name[0])}</span>`).join('')}
          </div>
          <span class="card-date">${p.updated_at || ''}</span>
        </div>
      </a>`;
  }).join('') || '<p class="empty-state">該当する案件がありません</p>';
}

// ============ Furniture ============
async function renderFurniture() {
  const data = await DataLoader.load('furniture');
  const furniture = data.furniture || [];
  document.getElementById('count-furniture').textContent = furniture.length;

  // Collect all groups: series + categories
  const allGroups = ['すべて'];
  const seriesSet = new Set();
  const catSet = new Set();
  furniture.forEach(f => {
    if (f.series) seriesSet.add(f.series);
    else if (f.category) catSet.add(f.category);
  });
  seriesSet.forEach(s => allGroups.push(s));
  catSet.forEach(c => allGroups.push(c));

  document.getElementById('furniture-filters').innerHTML = `
    <div class="filter-chips">
      ${allGroups.map(g => `<button class="chip${g === furnitureFilter ? ' active' : ''}"
        onclick="furnitureFilter='${g}';renderFurniture()">${g}</button>`).join('')}
    </div>`;

  // Group items
  function getGroup(f) { return f.series || f.category || 'その他'; }

  const filtered = furnitureFilter === 'すべて'
    ? furniture
    : furniture.filter(f => getGroup(f) === furnitureFilter);

  // Group by series/category for display
  const groups = {};
  filtered.forEach(f => {
    const g = getGroup(f);
    if (!groups[g]) groups[g] = [];
    groups[g].push(f);
  });

  // Build HTML with group headings, but cards flow horizontally within each group
  let html = '';
  for (const [groupName, items] of Object.entries(groups)) {
    html += `<h2 class="sub-title">${esc(groupName)}</h2>`;
    html += `<div class="card-grid material-grid">`;
    html += items.map(f => `
      <div class="card material-card">
        <div class="card-thumb-sm">
          ${(f.hero_photos && f.hero_photos[0])
            ? `<img src="${f.hero_photos[0]}" alt="${esc(f.name)}" loading="lazy" onerror="this.style.display='none'">`
            : `<div class="thumb-placeholder-sm">${esc(f.name_en ? f.name_en[0] : f.name[0])}</div>`}
        </div>
        <div class="card-body">
          <h3>${esc(f.name)}</h3>
          <p class="card-meta">${f.dimensions ? esc(f.dimensions) : ''} ${f.weight_kg ? '/ ' + f.weight_kg + 'kg' : ''}</p>
          <p class="card-meta">${esc(f.specs?.material || '')}</p>
        </div>
      </div>`).join('');
    html += `</div>`;
  }

  document.getElementById('furniture-grid').innerHTML = html
    || '<p class="empty-state">該当するプロダクトがありません</p>';
}

// ============ Materials ============
async function renderMaterials() {
  const data = await DataLoader.load('materials');
  const materials = data.materials || [];
  const candidates = data.candidates || [];
  const search = (document.getElementById('material-search')?.value || '').toLowerCase();

  document.getElementById('count-materials').textContent = materials.length + candidates.length;

  // Category filter
  const cats = ['すべて', ...new Set(materials.map(m => m.category).filter(Boolean))];
  document.getElementById('material-filters').innerHTML = `
    <div class="filter-chips">
      ${cats.map(c => `<button class="chip${c === materialTypeFilter ? ' active' : ''}"
        onclick="materialTypeFilter='${c}';renderMaterials()">${c}</button>`).join('')}
    </div>`;

  function matchSearch(m) {
    if (!search) return true;
    return (m.name + (m.product_code || '') + (m.maker || '') + (m.category || '') + (m.specs || '')).toLowerCase().includes(search);
  }

  function matchFilter(m) {
    if (materialTypeFilter === 'すべて') return true;
    return m.category === materialTypeFilter;
  }

  // Furniture hardware (什器系)
  const hwItems = materials.filter(m => m.type === 'furniture_hardware' && matchSearch(m) && matchFilter(m));
  document.getElementById('material-grid-hw').innerHTML = hwItems.map(m => renderMaterialCardHTML(m)).join('')
    || '<p class="empty-state">該当する什器系金物がありません</p>';

  // Architectural (建築系)
  const archItems = materials.filter(m => m.type === 'architectural' && matchSearch(m) && matchFilter(m));
  document.getElementById('material-grid-arch').innerHTML = archItems.map(m => renderMaterialCardHTML(m)).join('');
  document.getElementById('arch-empty').style.display = archItems.length === 0 ? 'block' : 'none';

  // Candidates
  const candFiltered = candidates.filter(c => matchSearch(c));
  document.getElementById('candidate-grid').innerHTML = candFiltered.map(c => `
    <div class="card material-card candidate">
      <div class="card-thumb-sm">
        ${c.thumbnail_url ? `<img src="${c.thumbnail_url}" alt="${esc(c.name)}" loading="lazy" onerror="this.style.display='none'">` : '<div class="thumb-placeholder-sm">?</div>'}
      </div>
      <div class="card-body">
        <span class="badge badge-pending">検討中</span>
        <h3>${esc(c.name)}</h3>
        <p class="card-meta">${esc(c.maker || '-')} / ${esc(c.category || '')}</p>
        <p class="card-price">${formatPrice(c.price)}</p>
        <p class="card-meta">${esc(c.posted_by || '')} — ${c.posted_at || ''}</p>
        ${c.product_url ? `<a href="${c.product_url}" target="_blank" rel="noopener" class="ext-link">商品ページ ↗</a>` : ''}
      </div>
    </div>
  `).join('') || '<p class="empty-state">検討中の候補はありません</p>';
}

function renderMaterialCardHTML(m) {
  const statusBadge = m.status === 'adopted' ? '<span class="badge badge-adopted">採用</span>' : '';
  return `
    <div class="card material-card">
      <div class="card-thumb-sm">
        ${m.thumbnail_url ? `<img src="${m.thumbnail_url}" alt="${esc(m.name)}" loading="lazy" onerror="this.style.display='none'">` : '<div class="thumb-placeholder-sm">&#9881;</div>'}
      </div>
      <div class="card-body">
        ${statusBadge}
        <h3>${esc(m.name)}</h3>
        <p class="card-meta">${esc(m.product_code || '-')} / ${esc(m.maker || '-')}</p>
        <p class="card-price">${formatPrice(m.price)}</p>
        <p class="card-meta card-specs">${esc(m.specs || '')}</p>
        ${m.product_url ? `<a href="${m.product_url}" target="_blank" rel="noopener" class="ext-link">商品ページ ↗</a>` : ''}
      </div>
    </div>`;
}

// ============ Init ============
document.addEventListener('DOMContentLoaded', async () => {
  try {
    initTabs();
    await Promise.all([renderProjects(), renderFurniture(), renderMaterials()]);

    const searchInput = document.getElementById('material-search');
    if (searchInput) {
      searchInput.addEventListener('input', () => renderMaterials());
    }
  } catch (e) {
    console.error('Init error:', e);
    document.querySelector('.content-area').innerHTML =
      '<p style="padding:40px;color:red">読み込みエラー: ' + e.message + '</p>';
  }
});
</script>
</body>
</html>
