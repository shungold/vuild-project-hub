<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUILD — Material Detail</title>
<link rel="stylesheet" href="../../style.css?v=6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="global-header">
  <div class="header-inner">
    <div class="brand">
      <a href="../../index.html#materials" class="brand-logo">VUILD</a>
      <div class="brand-divider"></div>
      <span class="brand-title" id="header-title">素材・金物</span>
    </div>
  </div>
</header>

<div class="detail-container">
  <a href="../../index.html#materials" class="back-link">&larr; 素材・金物一覧</a>

  <div class="hw-detail-hero" id="hw-hero">
    <div class="hw-detail-img" id="hw-img"></div>
    <div class="hw-detail-info" id="hw-info"></div>
  </div>

  <div class="detail-grid">
    <div class="detail-main">
      <!-- 使用furniture -->
      <div class="detail-section" id="section-furniture" style="display:none">
        <h2 class="detail-section-title">使用 VUILD Furniture</h2>
        <div class="detail-furniture-grid" id="hw-furniture"></div>
      </div>
    </div>

    <div class="detail-sidebar">
      <div class="spec-card">
        <div class="spec-card-header"><h3>Spec</h3></div>
        <div class="spec-card-body" id="hw-spec"></div>
      </div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="../../common.js?v=6"></script>
<script>
DataLoader.basePath = '../../';
const B = DataLoader.basePath;

const pathParts = location.pathname.split('/').filter(Boolean);
const materialId = pathParts[pathParts.length - 2] || pathParts[pathParts.length - 1];

async function init() {
  try {
    const [matData, projData, furnData] = await Promise.all([
      DataLoader.load('materials'),
      DataLoader.load('projects'),
      DataLoader.load('furniture')
    ]);

    const allMats = [...(matData.materials || []), ...(matData.candidates || [])];
    const item = allMats.find(m => m.id === materialId);
    if (!item) {
      document.querySelector('.detail-container').innerHTML =
        '<p class="empty-state">金物が見つかりません</p>';
      return;
    }

    document.title = 'VUILD — ' + item.name;
    document.getElementById('header-title').textContent = item.name;

    // Hero image
    document.getElementById('hw-img').innerHTML = item.thumbnail_url
      ? `<img src="${item.thumbnail_url}" alt="${esc(item.name)}" onclick="openLightbox('${item.thumbnail_url}')" style="cursor:pointer">`
      : '<div style="font-size:48px;color:var(--color-border)">\u2699</div>';

    // Info block
    let infoHtml = `<h1>${esc(item.name)}</h1>`;
    infoHtml += `<p style="color:var(--color-secondary);margin-bottom:4px">${esc(item.maker || '')} / ${esc(item.product_code || '')}</p>`;
    infoHtml += `<p style="font-size:24px;font-weight:700;margin-bottom:8px">${formatPrice(item.price)}</p>`;
    if (item.specs) infoHtml += `<p style="font-size:12px;color:var(--color-tertiary)">${esc(item.specs)}</p>`;
    infoHtml += '<div class="hw-detail-links">';
    if (item.product_url) {
      infoHtml += `<a href="${item.product_url}" target="_blank" class="model-dl-btn">\u{1F6D2} 商品ページ</a>`;
    }
    if (item.model_url) {
      infoHtml += `<a href="${item.model_url}" target="_blank" class="model-dl-btn">\u{1F4E6} 3Dモデル</a>`;
    }
    infoHtml += '</div>';
    document.getElementById('hw-info').innerHTML = infoHtml;

    // Spec card
    const specs = [
      ['品番', item.product_code],
      ['メーカー', item.maker],
      ['カテゴリ', item.category],
      ['タイプ', item.type === 'furniture_hardware' ? '什器系' : item.type === 'architectural' ? '建築系' : item.type],
      ['ステータス', item.status === 'adopted' ? '採用' : item.status === 'pending' ? '検討中' : item.status],
      ['登録者', item.created_by],
      ['Rhinoブロック', item.rhino_block]
    ].filter(([,v]) => v);
    document.getElementById('hw-spec').innerHTML = specs.map(([l,v]) =>
      `<div class="spec-row"><span class="spec-label">${esc(l)}</span><span class="spec-value">${esc(v)}</span></div>`
    ).join('');

    // Furniture using this material
    const furniture = (furnData.furniture || []).filter(f =>
      (f.hardware_ids || []).includes(materialId));
    if (furniture.length) {
      document.getElementById('section-furniture').style.display = '';
      document.getElementById('hw-furniture').innerHTML = furniture.map(f => {
        const thumb = (f.hero_photos && f.hero_photos[0])
          ? `<img src="${B}${f.hero_photos[0]}" alt="${esc(f.name)}" loading="lazy">`
          : `<div style="font-size:18px;color:var(--color-tertiary)">${esc(f.name[0])}</div>`;
        return `<a href="${B}furniture/${f.id}/index.html" class="furniture-link-card">
          <div class="flc-thumb">${thumb}</div>
          <div class="flc-body"><h4>${esc(f.name)}</h4><p>${esc(f.dimensions || '')}</p></div>
        </a>`;
      }).join('');
    }

  } catch (e) {
    console.error(e);
    document.querySelector('.detail-container').innerHTML =
      '<p style="padding:40px;color:red">Error: ' + e.message + '</p>';
  }
}

function openLightbox(src) {
  if (!src) return;
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('is-open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('is-open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
