<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUILD — Furniture Detail</title>
<link rel="stylesheet" href="../../style.css?v=4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- Hero -->
<div class="detail-hero" id="detail-hero"></div>

<!-- Header (sticky) -->
<header class="global-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-logo">VUILD</span>
      <div class="brand-divider"></div>
      <span class="brand-title" id="header-title">VUILD furniture</span>
    </div>
  </div>
</header>

<div class="detail-container">
  <a href="../../index.html#furniture" class="back-link">&larr; furnitureカタログに戻る</a>

  <div class="detail-grid">
    <!-- Main Column -->
    <div class="detail-main">

      <!-- Overview -->
      <div class="detail-section">
        <h2 class="detail-section-title">OVERVIEW</h2>
        <p class="detail-description" id="furn-description"></p>
      </div>

      <!-- Product Photos -->
      <div class="detail-section" id="section-photos" style="display:none">
        <h2 class="detail-section-title">PHOTOS</h2>
        <div class="detail-gallery" id="furn-gallery"></div>
      </div>

      <!-- 導入事例 -->
      <div class="detail-section" id="section-cases" style="display:none">
        <h2 class="detail-section-title">CASE STUDIES</h2>
        <p class="detail-section-sub">このプロダクトが導入された案件</p>
        <div class="detail-furniture-grid" id="furn-cases"></div>
      </div>

      <!-- 什器系 金物・素材 -->
      <div class="detail-section" id="section-hardware" style="display:none">
        <h2 class="detail-section-title">HARDWARE / PARTS</h2>
        <p class="detail-section-sub">この什器に使われた金物・パーツ</p>
        <div style="overflow-x:auto">
          <table class="material-table" id="furn-hardware">
            <thead>
              <tr><th>品名</th><th>品番</th><th>メーカー</th><th>単価</th><th></th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- 製作ナレッジ -->
      <div class="detail-section" id="section-knowledge" style="display:none">
        <h2 class="detail-section-title">PRODUCTION KNOWLEDGE</h2>
        <p class="detail-section-sub">製作フィードバック・ノウハウ</p>
        <div class="knowledge-timeline" id="furn-knowledge"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="detail-sidebar">
      <!-- Product Spec -->
      <div class="spec-card">
        <div class="spec-card-header">
          <h3>Product Spec</h3>
          <span class="badge" id="furn-series-badge" style="display:none"></span>
        </div>
        <div class="spec-card-body" id="furn-spec-body"></div>
      </div>

      <!-- Production Cost -->
      <div class="spec-card" id="cost-card" style="margin-top:16px; display:none">
        <div class="spec-card-header"><h3>Production Cost</h3></div>
        <div class="spec-card-body" id="furn-cost-body"></div>
      </div>

      <!-- Tags -->
      <div id="furn-tags" style="margin-top:16px; display:flex; flex-wrap:wrap; gap:6px;"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="../../common.js?v=4"></script>
<script>
DataLoader.basePath = '../../';
const BASE = DataLoader.basePath;

const pathParts = location.pathname.split('/').filter(Boolean);
const furnitureId = pathParts[pathParts.length - 2] || pathParts[pathParts.length - 1];

async function init() {
  try {
    const [furnData, projData, matData, knowData] = await Promise.all([
      DataLoader.load('furniture'),
      DataLoader.load('projects'),
      DataLoader.load('materials'),
      DataLoader.load('knowledge')
    ]);

    const allFurniture = furnData.furniture || [];
    const item = allFurniture.find(f => f.id === furnitureId);
    if (!item) {
      document.querySelector('.detail-container').innerHTML =
        '<p style="padding:60px;text-align:center;color:#999">プロダクトが見つかりません: ' + esc(furnitureId) + '</p>';
      return;
    }

    document.title = `VUILD furniture — ${item.name}`;
    document.getElementById('header-title').textContent = item.name;

    // ── Hero (アクソメ or プロダクト写真) ──
    const heroEl = document.getElementById('detail-hero');
    if (item.hero_photos && item.hero_photos.length) {
      heroEl.innerHTML = `
        <img src="${BASE}${item.hero_photos[0]}" alt="${esc(item.name)}">
        <div class="detail-hero-overlay">
          ${item.series ? '<div class="detail-pid">' + esc(item.series) + '</div>' : ''}
          <h1>${esc(item.name)}</h1>
        </div>`;
    } else {
      heroEl.innerHTML = `
        <div class="detail-hero-placeholder">${esc(item.name_en || item.name)}</div>
        <div class="detail-hero-overlay">
          ${item.series ? '<div class="detail-pid">' + esc(item.series) + '</div>' : ''}
          <h1>${esc(item.name)}</h1>
        </div>`;
    }

    // ── Description ──
    document.getElementById('furn-description').textContent =
      item.description || '（説明はまだ登録されていません）';

    // ── Spec card ──
    const specs = [
      ['寸法', item.dimensions],
      ['重量', item.weight_kg ? item.weight_kg + ' kg' : null],
      ['素材', item.specs?.material],
      ['仕上げ', item.specs?.finish],
      ['備考', item.specs?.note]
    ].filter(([,v]) => v);

    document.getElementById('furn-spec-body').innerHTML = specs.map(([l, v]) =>
      `<div class="spec-row"><span class="spec-label">${esc(l)}</span><span class="spec-value">${esc(v)}</span></div>`
    ).join('');

    // Series badge
    if (item.series) {
      const badge = document.getElementById('furn-series-badge');
      badge.textContent = item.series;
      badge.className = 'badge badge-active';
      badge.style.display = '';
    }

    // ── Production Cost (生産原価) ──
    const costCard = document.getElementById('cost-card');
    if (item.production_cost) {
      costCard.style.display = '';
      const costRows = [['生産原価', formatPrice(item.production_cost)]];
      if (item.cost_breakdown) {
        for (const [k, v] of Object.entries(item.cost_breakdown)) {
          costRows.push([k, formatPrice(v)]);
        }
      }
      document.getElementById('furn-cost-body').innerHTML = costRows.map(([l,v]) =>
        `<div class="spec-row"><span class="spec-label">${esc(l)}</span><span class="spec-value">${v}</span></div>`
      ).join('');
    }

    // ── Tags ──
    document.getElementById('furn-tags').innerHTML = (item.tags || []).map(t =>
      `<span class="tag">${esc(t)}</span>`
    ).join('');

    // ── Photos ──
    const photos = [...(item.hero_photos || []), ...(item.gallery_photos || [])];
    if (photos.length > 0) {
      document.getElementById('section-photos').style.display = '';
      document.getElementById('furn-gallery').innerHTML = photos.map(src =>
        `<div class="detail-gallery-item" onclick="openLightbox('${BASE}${src}')">
          <img src="${BASE}${src}" alt="" loading="lazy">
        </div>`
      ).join('');
    }

    // ── Case Studies: このfurnitureを使った案件 ──
    const projects = projData.projects || [];
    const cases = projects.filter(p =>
      (p.furniture_ids || []).includes(furnitureId)
    );
    if (cases.length > 0) {
      document.getElementById('section-cases').style.display = '';
      document.getElementById('furn-cases').innerHTML = cases.map(p => {
        const thumb = (p.hero_photos && p.hero_photos[0])
          ? `<img src="${BASE}${p.hero_photos[0]}" alt="${esc(p.name)}" loading="lazy">`
          : `<div style="font-size:20px;color:var(--color-tertiary)">${esc(p.pid || p.name[0])}</div>`;
        return `
          <a href="${BASE}projects/${p.id}/index.html" class="furniture-link-card">
            <div class="flc-thumb">${thumb}</div>
            <div class="flc-body">
              <h4>${esc(p.name)}</h4>
              <p>${esc(p.pid)} — ${esc(p.client)}</p>
            </div>
          </a>`;
      }).join('');
    }

    // ── Hardware: 什器系金物 (furniture_hardware) ──
    const hwItems = (matData.materials || []).filter(m =>
      (item.hardware_ids || []).includes(m.id) && m.type === 'furniture_hardware'
    );
    if (hwItems.length > 0) {
      document.getElementById('section-hardware').style.display = '';
      document.getElementById('furn-hardware').querySelector('tbody').innerHTML =
        hwItems.map(m => `
          <tr>
            <td class="mat-name">${esc(m.name)}</td>
            <td>${esc(m.product_code || '-')}</td>
            <td>${esc(m.maker || '-')}</td>
            <td class="mat-price">${formatPrice(m.price)}</td>
            <td>${m.product_url ? `<a href="${m.product_url}" target="_blank" rel="noopener">詳細 &nearr;</a>` : ''}</td>
          </tr>`
        ).join('');
    }

    // ── Knowledge: 製作系(production)のみ ──
    const prodKnowledge = (knowData.entries || []).filter(k =>
      k.furniture_id === furnitureId && k.scope === 'production'
    );
    if (prodKnowledge.length > 0) {
      document.getElementById('section-knowledge').style.display = '';
      document.getElementById('furn-knowledge').innerHTML = prodKnowledge.map(k => {
        const info = getKnowledgeTypeInfo(k.type);
        return `
          <div class="knowledge-entry">
            <div class="knowledge-entry__header">
              <span class="badge badge--${k.type}">${info.label}</span>
              <span class="knowledge-entry__date">${formatDate(k.date)}</span>
            </div>
            <h4 style="font-size:14px;margin:4px 0">${esc(k.title)}</h4>
            <p class="knowledge-entry__body">${esc(k.content || '')}</p>
          </div>`;
      }).join('');
    }

  } catch (e) {
    console.error('Furniture detail init error:', e);
    document.querySelector('.detail-container').innerHTML =
      '<p style="padding:40px;color:red">読み込みエラー: ' + e.message + '</p>';
  }
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('is-open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('is-open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
