<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUILD — Project Detail</title>
<link rel="stylesheet" href="../../style.css?v=5">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header class="global-header">
  <div class="header-inner">
    <div class="brand">
      <a href="../../index.html" class="brand-logo">VUILD</a>
      <div class="brand-divider"></div>
      <span class="brand-title" id="header-title">Project Hub</span>
    </div>
  </div>
</header>

<div class="detail-container">
  <a href="../../index.html" class="back-link">&larr; 案件一覧</a>

  <!-- Title -->
  <div class="detail-title-block" id="title-block">
    <h1 id="project-name"></h1>
    <p class="detail-sub" id="project-sub"></p>
  </div>

  <!-- Pin Editor Bar -->
  <div class="pin-editor-bar" id="pin-editor-bar" style="display:none">
    <span>ピン編集モード</span>
    <button class="pin-edit-toggle" id="pin-edit-toggle" onclick="PinEditor.toggle()">編集ON</button>
    <span style="font-size:10px;color:var(--color-tertiary)">写真をクリックしてピンを追加</span>
  </div>

  <!-- Photo + Pin Side Panel -->
  <div class="detail-photo-area" id="photo-area" style="display:none">
    <div class="pin-layout" id="pin-layout">
      <div>
        <div class="detail-photo-main" id="photo-main"></div>
        <div class="detail-photo-thumbs" id="photo-thumbs"></div>
      </div>
      <div class="pin-side-panel" id="pin-side-panel">
        <div class="psp-label">写真のピンをクリックすると詳細が表示されます</div>
      </div>
    </div>
  </div>

  <!-- Two-column: Main + Sidebar -->
  <div class="detail-grid">
    <div class="detail-main">

      <!-- Year Tabs (楽天など年次案件用) -->
      <div class="year-tabs" id="year-tabs" style="display:none"></div>

      <!-- Overview -->
      <div class="detail-section">
        <h2 class="detail-section-title">Overview</h2>
        <p class="detail-description" id="detail-description"></p>
      </div>

      <!-- Tabs -->
      <div class="detail-tabs" id="detail-tabs"></div>

      <!-- Tab Panels -->
      <div id="tab-panels">
        <div class="detail-tab-panel" id="panel-furniture"></div>
        <div class="detail-tab-panel" id="panel-materials"></div>
        <div class="detail-tab-panel" id="panel-drawings"></div>
        <div class="detail-tab-panel" id="panel-estimate"></div>
        <div class="detail-tab-panel" id="panel-actual"></div>
        <div class="detail-tab-panel" id="panel-knowledge"></div>
        <div class="detail-tab-panel" id="panel-projdoc"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="detail-sidebar">
      <div class="spec-card">
        <div class="spec-card-header">
          <h3>Data</h3>
          <span class="badge" id="spec-status"></span>
        </div>
        <div class="spec-card-body" id="spec-body"></div>
      </div>

      <div class="spec-card">
        <div class="spec-card-header"><h3>Credit</h3></div>
        <div class="team-list" id="detail-team"></div>
      </div>

      <div id="model-section"></div>

      <div id="detail-tags" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="../../common.js?v=5"></script>
<script>
DataLoader.basePath = '../../';
const B = DataLoader.basePath;

const pathParts = location.pathname.replace(/\/index\.html$/, '').split('/').filter(Boolean);
const projectId = pathParts[pathParts.length - 1];

// --- Tab switching ---
function initDetailTabs() {
  document.querySelectorAll('.detail-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('is-active'));
      document.querySelectorAll('.detail-tab-panel').forEach(p => p.classList.remove('is-active'));
      tab.classList.add('is-active');
      const panel = document.getElementById('panel-' + tab.dataset.panel);
      if (panel) panel.classList.add('is-active');
    });
  });
}

// --- Photo switching with pins + side panel ---
let _currentPhotoIndex = 0;
let _photoPins = [];
let _matData = null;
let _furnData = null;

function setMainPhoto(src, photoIndex) {
  _currentPhotoIndex = photoIndex != null ? photoIndex : 0;
  const main = document.getElementById('photo-main');
  const pinsForPhoto = _photoPins.filter(p => p.photo_index === _currentPhotoIndex);
  let pinsHtml = pinsForPhoto.map((pin, i) =>
    `<div class="photo-pin" style="left:${pin.x}%;top:${pin.y}%" onclick="event.stopPropagation();showPinDetail(${_currentPhotoIndex},${i})">
      <div class="pin-dot"></div>
    </div>`
  ).join('');

  main.innerHTML = `<div class="pin-photo-container">
    <img src="${src}" alt="" onclick="openLightbox('${src}')">
    ${pinsHtml}
  </div>`;
  main.onclick = null;

  document.querySelectorAll('.detail-photo-thumb').forEach(t => {
    t.classList.toggle('is-active', t.dataset.src === src);
  });

  // Reset side panel
  document.getElementById('pin-side-panel').innerHTML =
    '<div class="psp-label">写真のピンをクリックすると詳細が表示されます</div>';
}

function showPinDetail(photoIdx, pinIdx) {
  const pin = _photoPins.filter(p => p.photo_index === photoIdx)[pinIdx];
  if (!pin) return;
  const panel = document.getElementById('pin-side-panel');

  if (pin.type === 'material') {
    const allMats = [...((_matData||{}).materials||[]), ...((_matData||{}).candidates||[])];
    const m = allMats.find(x => x.id === pin.id);
    if (m) {
      const href = B + 'materials/' + m.id + '/index.html';
      panel.innerHTML = `
        <div class="psp-label">Hardware Detail</div>
        ${m.thumbnail_url ? '<div class="psp-thumb"><img src="' + m.thumbnail_url + '" alt=""></div>' : ''}
        <h3>${esc(m.name)}</h3>
        <div class="psp-meta">${esc(m.maker || '')} &middot; <a href="${m.product_url || '#'}" target="_blank">商品ページ</a></div>
        <div style="font-size:18px;font-weight:700;margin:4px 0">${formatPrice(m.price)}</div>
        <div class="psp-specs">${esc(m.specs || '')}</div>
        <div class="psp-links"><a href="${href}">金物詳細ページ &rarr;</a></div>`;
      return;
    }
  }
  if (pin.type === 'furniture') {
    const f = ((_furnData||{}).furniture||[]).find(x => x.id === pin.id);
    if (f) {
      const href = B + 'furniture/' + f.id + '/index.html';
      const thumb = f.hero_photos && f.hero_photos[0] ? B + f.hero_photos[0] : '';
      panel.innerHTML = `
        <div class="psp-label">VUILD Furniture</div>
        ${thumb ? '<div class="psp-thumb"><img src="' + thumb + '" alt=""></div>' : ''}
        <h3>${esc(f.name)}</h3>
        <div class="psp-meta">${esc(f.dimensions || '')} &middot; ${esc(f.specs?.material || '')}</div>
        <div class="psp-specs">${esc(f.description || '')}</div>
        <div class="psp-links"><a href="${href}">furniture詳細 &rarr;</a></div>`;
      return;
    }
  }
  panel.innerHTML = `<div class="psp-label">${esc(pin.label)}</div>`;
}

async function init() {
  try {
    const [projData, furnData, matData, knowData] = await Promise.all([
      DataLoader.load('projects'),
      DataLoader.load('furniture'),
      DataLoader.load('materials'),
      DataLoader.load('knowledge')
    ]);

    const project = (projData.projects || []).find(p => p.id === projectId);
    if (!project) {
      document.querySelector('.detail-container').innerHTML =
        '<p class="empty-state">案件が見つかりません</p>';
      return;
    }

    document.title = 'VUILD — ' + project.name;
    document.getElementById('header-title').textContent = project.name;
    document.getElementById('project-name').textContent = project.name;
    document.getElementById('project-sub').textContent =
      [project.pid, project.client, project.location].filter(Boolean).join(' — ');

    // --- Store data for pin panel ---
    _matData = matData;
    _furnData = furnData;

    // --- Photos with pins (PinEditor.loadPins merges localStorage edits) ---
    _photoPins = project.photo_pins || [];
    const photos = [...(project.hero_photos || []), ...(project.gallery_photos || [])];
    document.getElementById('photo-area').style.display = '';
    if (photos.length) {
      setMainPhoto(B + photos[0], 0);
    }
    let thumbsHtml = photos.map((src, i) =>
      `<div class="detail-photo-thumb${i === 0 ? ' is-active' : ''}" style="position:relative"
           data-src="${B}${src}" onclick="setMainPhoto('${B}${src}', ${i})">
        <img src="${B}${src}" alt="" loading="lazy">
        <div class="img-delete-btn" onclick="event.stopPropagation();WebEditor.removeImage('project','${projectId}','${src}');this.parentElement.remove();">&times;</div>
      </div>`
    ).join('');
    thumbsHtml += `<div class="detail-photo-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--color-bg);cursor:pointer;border:1px dashed var(--color-border)" onclick="WebEditor.addImageUI('project','${projectId}',()=>location.reload())">
      <span style="font-size:20px;color:var(--color-tertiary)">+</span>
    </div>`;
    document.getElementById('photo-thumbs').innerHTML = thumbsHtml;

    // --- Description ---
    document.getElementById('detail-description').textContent =
      project.description || '';

    // --- Year Tabs (年次タブ) ---
    let _activeYear = null;
    const years = project.years || {};
    const yearKeys = Object.keys(years).sort();
    if (yearKeys.length > 1) {
      _activeYear = yearKeys[yearKeys.length - 1]; // default to latest year
      const ytEl = document.getElementById('year-tabs');
      ytEl.style.display = '';
      ytEl.innerHTML = yearKeys.map(y =>
        `<button class="year-tab${y === _activeYear ? ' is-active' : ''}" data-year="${y}">
          ${y}<span style="font-size:11px;font-weight:400;margin-left:4px;color:var(--color-tertiary)">${esc(years[y].label || '')}</span>
        </button>`
      ).join('');
      ytEl.querySelectorAll('.year-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          _activeYear = btn.dataset.year;
          ytEl.querySelectorAll('.year-tab').forEach(b => b.classList.remove('is-active'));
          btn.classList.add('is-active');
          rebuildForYear();
        });
      });
    }

    function getActiveFurnitureIds() {
      if (_activeYear && years[_activeYear]) return years[_activeYear].furniture_ids || [];
      return project.furniture_ids || [];
    }

    function rebuildForYear() {
      if (!_activeYear || !years[_activeYear]) return;
      const y = years[_activeYear];

      // 1. Furniture一覧パネル
      const yFurnIds = y.furniture_ids || [];
      const yFurnItems = (furnData.furniture || []).filter(f => yFurnIds.includes(f.id));
      if (yFurnItems.length) {
        document.getElementById('panel-furniture').innerHTML =
          '<div class="detail-furniture-grid">' + yFurnItems.map(f => {
            const thumb = (f.hero_photos && f.hero_photos[0])
              ? `<img src="${B}${f.hero_photos[0]}" alt="${esc(f.name)}" loading="lazy">`
              : `<div style="font-size:24px;color:var(--color-tertiary)">${esc(f.name_en ? f.name_en[0] : f.name[0])}</div>`;
            return `<a href="${B}furniture/${f.id}/index.html" class="furniture-link-card">
              <div class="flc-thumb">${thumb}</div>
              <div class="flc-body">
                <h4>${esc(f.name)}</h4>
                <p>${esc(f.dimensions || '')}</p>
              </div>
            </a>`;
          }).join('') + '</div>';
      }

      // 2. Gallery写真の切り替え
      const yPhotos = y.gallery_photos || [];
      if (yPhotos.length) {
        const mainSrc = B + yPhotos[0];
        setMainPhoto(mainSrc, 0);
        _photoPins = []; // 年切り替え時はピンリセット
        let thumbsHtml = yPhotos.map((src, i) =>
          `<div class="detail-photo-thumb${i === 0 ? ' is-active' : ''}" style="position:relative"
               data-src="${B}${src}" onclick="setMainPhoto('${B}${src}', ${i})">
            <img src="${B}${src}" alt="" loading="lazy">
          </div>`
        ).join('');
        document.getElementById('photo-thumbs').innerHTML = thumbsHtml;
      }

      // 3. コスト（見積パネル）の切り替え
      const yCost = y.cost_overview || {};
      if (yCost.total) {
        let costHtml = '<div class="spec-card" style="max-width:500px;margin-bottom:16px"><div class="spec-card-header"><h3>予算 (' + _activeYear + ')</h3></div><div class="spec-card-body">';
        costHtml += '<div class="spec-row" style="font-weight:700"><span class="spec-label">合計</span><span class="spec-value">' + formatPrice(yCost.total) + '</span></div>';
        if (yCost.budget_note) costHtml += '<div class="spec-row"><span class="spec-label" style="color:var(--color-tertiary);font-size:11px">' + esc(yCost.budget_note) + '</span></div>';
        costHtml += '</div></div>';
        document.getElementById('panel-estimate').innerHTML = costHtml;
      }

      // 4. ナレッジのdateで年フィルタ
      const yKnowledge = (knowData.entries || []).filter(k =>
        (k.project_id === projectId || k.linked_id === projectId) && k.scope === 'design' &&
        k.date && k.date.startsWith(_activeYear)
      );
      // production knowledgeも年フィルタ（furniture_idが今年のfurniture_idsに含まれるもの）
      const yProdKnowledge = (knowData.entries || []).filter(k =>
        k.project_id === projectId && k.scope === 'production' &&
        k.furniture_id && yFurnIds.includes(k.furniture_id)
      );
      const allYearKnow = [...yKnowledge, ...yProdKnowledge];
      if (allYearKnow.length) {
        window._knowledgeData = allYearKnow;
        document.getElementById('panel-knowledge').innerHTML =
          '<div class="hw-card-grid">' + allYearKnow.map((k, idx) => {
            const info = getKnowledgeTypeInfo(k.type);
            const imgs = k.images || [];
            return `<div class="know-card" onclick="openKnowledgeModal(${idx})" style="cursor:pointer">
              <div class="know-card-header">
                <span class="badge badge--${k.type}">${info.label}</span>
                <span style="font-size:10px;color:var(--color-tertiary)">${formatDate(k.date)}</span>
              </div>
              <h4>${esc(k.title)}</h4>
              <p>${esc(k.content || '')}</p>
              ${imgs.length ? '<div style="font-size:10px;color:var(--color-edit-blue);margin-top:4px">\u{1F4F7} ' + imgs.length + '枚の画像</div>' : ''}
              <div class="know-author">${esc(k.posted_by || '')}</div>
            </div>`;
          }).join('') + '</div>';
      } else {
        document.getElementById('panel-knowledge').innerHTML =
          '<p style="color:var(--color-tertiary);font-size:13px;padding:16px 0">' + _activeYear + '年のナレッジはまだ登録されていません</p>';
      }

      // 5. Spec cardの会場・会期
      const yearInfo = document.getElementById('year-info');
      if (yearInfo) yearInfo.innerHTML = `<div class="spec-row"><span class="spec-label">会場</span><span class="spec-value">${esc(y.venue || '')}</span></div>
        <div class="spec-row"><span class="spec-label">会期</span><span class="spec-value">${esc(y.event_date || '')}</span></div>`;
    }

    // --- Spec card ---
    const specs = [
      ['案件番号', project.pid],
      ['カテゴリ', project.category],
      ['所在地', project.location],
      ['構造', project.structure],
      ['面積', project.area_sqm ? project.area_sqm + ' m\u00B2' : null],
      ['竣工', project.completion_date]
    ].filter(([,v]) => v);
    let specHtml = specs.map(([l,v]) =>
      `<div class="spec-row"><span class="spec-label">${esc(l)}</span><span class="spec-value">${esc(v)}</span></div>`
    ).join('');
    if (yearKeys.length > 1 && _activeYear && years[_activeYear]) {
      const y = years[_activeYear];
      specHtml += `<div id="year-info">
        <div class="spec-row"><span class="spec-label">会場</span><span class="spec-value">${esc(y.venue || '')}</span></div>
        <div class="spec-row"><span class="spec-label">会期</span><span class="spec-value">${esc(y.event_date || '')}</span></div>
      </div>`;
    }
    document.getElementById('spec-body').innerHTML = specHtml;

    const statusEl = document.getElementById('spec-status');
    statusEl.textContent = getStatusLabel(project.status);
    statusEl.className = 'badge badge-' + (project.status || '');

    // --- Team ---
    document.getElementById('detail-team').innerHTML = (project.team || []).map(m =>
      `<div class="team-member">
        <div class="team-avatar">${esc(m.name[0])}</div>
        <span class="team-name">${esc(m.name)}</span>
        <span class="team-role">${esc(m.role)}</span>
      </div>`
    ).join('');

    // --- Tags ---
    document.getElementById('detail-tags').innerHTML = (project.tags || []).map(t =>
      `<span class="tag">${esc(t)}</span>`
    ).join('');

    // --- Build Tabs ---
    const activeFurnIds = getActiveFurnitureIds();
    const furnitureItems = (furnData.furniture || []).filter(f =>
      activeFurnIds.includes(f.id));
    const archMaterials = (matData.materials || []).filter(m =>
      (project.material_ids || []).includes(m.id) && m.type === 'architectural');
    const projectKnowledge = (knowData.entries || []).filter(k =>
      (k.project_id === projectId || k.linked_id === projectId) && k.scope === 'design');
    const projDocs = (knowData.project_documents || []).filter(d =>
      d.project_id === projectId);
    // 参考資料: furnitureのdocumentsを集約
    const allDocuments = [];
    furnitureItems.forEach(f => {
      (f.documents || []).forEach(d => allDocuments.push({ ...d, from: f.name }));
    });
    const estimateDocs = allDocuments.filter(d => d.type === 'estimate' || d.type === 'invoice');
    const refDocs = allDocuments.filter(d => d.type !== 'estimate' && d.type !== 'invoice');

    const hasDrawings = project.drawings && project.drawings.length;
    const co = project.cost_overview || {};
    const hasEstimate = co.total || estimateDocs.length;
    const hasFurnCost = furnitureItems.some(f => f.production_cost);

    const tabs = [];
    if (furnitureItems.length) tabs.push({ id: 'furniture', label: 'VUILD Furniture', count: furnitureItems.length });
    if (archMaterials.length) tabs.push({ id: 'materials', label: 'Materials', count: archMaterials.length });
    tabs.push({ id: 'drawings', label: '図面', count: hasDrawings ? project.drawings.length : 0 });
    tabs.push({ id: 'estimate', label: '見積', count: estimateDocs.length || null });
    tabs.push({ id: 'actual', label: '実績', count: null });
    tabs.push({ id: 'knowledge', label: 'Knowledge', count: projectKnowledge.length });
    tabs.push({ id: 'projdoc', label: '案件ドキュメント', count: projDocs.length });

    document.getElementById('detail-tabs').innerHTML = tabs.map((t, i) =>
      `<button class="detail-tab${i === 0 ? ' is-active' : ''}" data-panel="${t.id}">
        ${t.label}${t.count != null ? '<span class="tab-count">' + t.count + '</span>' : ''}
      </button>`
    ).join('');
    document.getElementById('panel-' + tabs[0].id).classList.add('is-active');
    initDetailTabs();

    // --- Furniture panel ---
    if (furnitureItems.length) {
      document.getElementById('panel-furniture').innerHTML =
        '<div class="detail-furniture-grid">' + furnitureItems.map(f => {
          const thumb = (f.hero_photos && f.hero_photos[0])
            ? `<img src="${B}${f.hero_photos[0]}" alt="${esc(f.name)}" loading="lazy">`
            : `<div style="font-size:24px;color:var(--color-tertiary)">${esc(f.name_en ? f.name_en[0] : f.name[0])}</div>`;
          return `<a href="${B}furniture/${f.id}/index.html" class="furniture-link-card">
            <div class="flc-thumb">${thumb}</div>
            <div class="flc-body">
              <h4>${esc(f.name)}</h4>
              <p>${esc(f.dimensions || '')}</p>
            </div>
          </a>`;
        }).join('') + '</div>';
    }

    // --- Materials panel ---
    if (archMaterials.length) {
      document.getElementById('panel-materials').innerHTML =
        '<div class="hw-card-grid">' + archMaterials.map(m => `
          <a href="${B}materials/${m.id}/index.html" class="hw-card">
            <div class="hw-card-thumb">
              ${m.thumbnail_url ? `<img src="${m.thumbnail_url}" alt="${esc(m.name)}" loading="lazy" onerror="this.style.display='none'">` : '<div class="hw-icon">\u2699</div>'}
            </div>
            <div class="hw-card-body">
              <h4>${esc(m.name)}</h4>
              <div class="hw-meta">${esc(m.maker || '')} / ${esc(m.product_code || '')}</div>
              <div class="hw-price">${formatPrice(m.price)}</div>
            </div>
          </a>
        `).join('') + '</div>';
    }

    // --- 見積 panel (予算サマリ + 見積/請求書 + 追加UI) ---
    {
      const typeIcons = { estimate: '\u{1F4C4}', invoice: '\u{1F4B0}', drawing: '\u{1F4D0}', memo: '\u{1F4DD}', model: '\u{1F4E6}' };
      const statusClass = { '検討中': 'pending', '請求済み': 'invoiced', '支払済み': 'paid' };
      let estHtml = '';

      if (co.total) {
        estHtml += '<div class="spec-card" style="max-width:500px;margin-bottom:16px"><div class="spec-card-header"><h3>予算</h3></div><div class="spec-card-body">';
        estHtml += `<div class="spec-row" style="font-weight:700"><span class="spec-label">プロジェクト予算</span><span class="spec-value">${formatPrice(co.total)}</span></div>`;
        if (co.design_fee) estHtml += `<div class="spec-row"><span class="spec-label">設計費</span><span class="spec-value">${formatPrice(co.design_fee)}</span></div>`;
        if (co.fabrication_fee) estHtml += `<div class="spec-row"><span class="spec-label">制作費</span><span class="spec-value">${formatPrice(co.fabrication_fee)}</span></div>`;
        if (co.budget_note) estHtml += `<div class="spec-row"><span class="spec-label" style="color:var(--color-tertiary);font-size:11px" colspan="2">${esc(co.budget_note)}</span></div>`;
        estHtml += '</div></div>';
      }

      if (estimateDocs.length) {
        estHtml += '<h3 class="sub-title">見積・請求書</h3><div class="doc-list">';
        estHtml += estimateDocs.map(d => `
          <a href="${d.url || '#'}" target="_blank" class="doc-item" style="text-decoration:none">
            <div class="doc-icon">${typeIcons[d.type] || '\u{1F4CE}'}</div>
            <div style="flex:1">
              <div class="doc-label">${esc(d.label)}</div>
              ${d.note ? '<div class="doc-note">' + esc(d.note) + '</div>' : ''}
              <div class="doc-note" style="color:var(--color-edit-blue)">${esc(d.from || '')}</div>
            </div>
            <span class="badge badge-doc-${statusClass[d.status] || 'pending'}">${esc(d.status || '検討中')}</span>
          </a>`).join('');
        estHtml += '</div>';
      }

      estHtml += `<div style="margin-top:12px">
        <button onclick="WebEditor.addDocumentUI('project','${projectId}',function(){location.reload()})" style="padding:6px 14px;font-size:12px;background:var(--color-surface);border:1px dashed var(--color-border);border-radius:4px;cursor:pointer;color:var(--color-secondary)">+ 参考資料を追加</button>
      </div>`;

      if (!co.total && !estimateDocs.length) {
        estHtml = '<p style="color:var(--color-tertiary);font-size:13px;padding:16px 0">見積情報はまだ登録されていません</p>' + estHtml;
      }
      document.getElementById('panel-estimate').innerHTML = estHtml;
    }

    // --- 実績 panel (furniture原価集約 + プロジェクトコスト + 参考資料) ---
    {
      let actHtml = '';

      // 紐づくfurnitureの原価
      if (furnitureItems.length) {
        let furnTotal = 0;
        actHtml += '<h3 class="sub-title">Furniture 原価</h3>';
        actHtml += '<div class="spec-card" style="max-width:500px;margin-bottom:16px"><div class="spec-card-body">';
        furnitureItems.forEach(f => {
          const cost = f.production_cost || 0;
          furnTotal += cost;
          actHtml += `<div class="spec-row"><span class="spec-label"><a href="${B}furniture/${f.id}/index.html" style="color:var(--color-edit-blue)">${esc(f.name)}</a></span><span class="spec-value">${cost ? formatPrice(cost) : '<span style="color:var(--color-tertiary)">未取得</span>'}</span></div>`;
        });
        if (furnTotal) {
          actHtml += `<div class="spec-row" style="border-top:1px solid var(--color-border);margin-top:4px;padding-top:4px;font-weight:700"><span class="spec-label">Furniture原価合計</span><span class="spec-value">${formatPrice(furnTotal)}</span></div>`;
        }
        actHtml += '</div></div>';
      }

      // プロジェクト固有コスト（設計費など）
      if (co.design_fee) {
        actHtml += '<h3 class="sub-title">プロジェクトコスト</h3>';
        actHtml += '<div class="spec-card" style="max-width:500px;margin-bottom:16px"><div class="spec-card-body">';
        actHtml += `<div class="spec-row"><span class="spec-label">設計費</span><span class="spec-value">${formatPrice(co.design_fee)}</span></div>`;
        actHtml += '</div></div>';
      }

      // 参考資料（見積/請求以外）
      if (refDocs.length) {
        const typeIcons = { drawing: '\u{1F4D0}', memo: '\u{1F4DD}', model: '\u{1F4E6}' };
        actHtml += '<h3 class="sub-title">参考資料</h3><div class="doc-list">';
        actHtml += refDocs.map(d => `
          <a href="${d.url || '#'}" target="_blank" class="doc-item" style="text-decoration:none">
            <div class="doc-icon">${typeIcons[d.type] || '\u{1F4CE}'}</div>
            <div><div class="doc-label">${esc(d.label)}</div>${d.note ? '<div class="doc-note">' + esc(d.note) + '</div>' : ''}</div>
          </a>`).join('');
        actHtml += '</div>';
      }

      actHtml += `<div style="margin-top:12px">
        <button onclick="WebEditor.addCostItemUI('project','${projectId}',()=>location.reload())" style="padding:6px 14px;font-size:12px;background:var(--color-surface);border:1px dashed var(--color-border);border-radius:4px;cursor:pointer;color:var(--color-secondary)">+ コスト項目を追加</button>
      </div>`;

      if (!actHtml.includes('sub-title')) {
        actHtml = '<p style="color:var(--color-tertiary);font-size:13px;padding:16px 0">実績コストはまだ登録されていません</p>' + actHtml;
      }
      document.getElementById('panel-actual').innerHTML = actHtml;
    }

    // --- Knowledge panel (design scopeのみ、0件でも空メッセージ表示) ---
    if (projectKnowledge.length) {
      window._knowledgeData = projectKnowledge;
      document.getElementById('panel-knowledge').innerHTML =
        '<div class="hw-card-grid">' + projectKnowledge.map((k, idx) => {
          const info = getKnowledgeTypeInfo(k.type);
          const imgs = k.images || [];
          return `<div class="know-card" onclick="openKnowledgeModal(${idx})" style="cursor:pointer">
            <div class="know-card-header">
              <span class="badge badge--${k.type}">${info.label}</span>
              <span style="font-size:10px;color:var(--color-tertiary)">${formatDate(k.date)}</span>
            </div>
            <h4>${esc(k.title)}</h4>
            <p>${esc(k.content || '')}</p>
            ${imgs.length ? '<div style="font-size:10px;color:var(--color-edit-blue);margin-top:4px">\u{1F4F7} ' + imgs.length + '枚の画像</div>' : ''}
            <div class="know-author">${esc(k.posted_by || '')}</div>
          </div>`;
        }).join('') + '</div>';
    } else {
      document.getElementById('panel-knowledge').innerHTML =
        '<p style="color:var(--color-tertiary);font-size:13px;padding:16px 0">案件レベルのナレッジ（scope: design）はまだ登録されていません。<br>制作に関するナレッジは各furnitureページに表示されます。</p>';
    }

    // --- 案件ドキュメント panel (アコーディオン) ---
    {
      let pdHtml = '';
      if (projDocs.length) {
        projDocs.forEach(doc => {
          const statusBadge = doc.status === 'published'
            ? '<span class="badge badge-adopted">公開</span>'
            : '<span class="badge badge-pending">下書き</span>';
          pdHtml += `<div class="projdoc-card">
            <div class="projdoc-header">${statusBadge} <span style="font-size:11px;color:var(--color-tertiary)">生成日: ${doc.generated_at || '—'}</span></div>`;
          (doc.sections || []).forEach(sec => {
            pdHtml += `<details class="projdoc-section">
              <summary class="projdoc-summary">${esc(sec.title)}</summary>
              <div class="projdoc-content">${esc(sec.content || '未記入').replace(/\\n/g, '\n').replace(/\n/g, '<br>')}</div>
            </details>`;
          });
          pdHtml += '</div>';
        });
      } else {
        pdHtml = '<p style="color:var(--color-tertiary);font-size:13px;padding:16px 0">案件ドキュメントはまだ生成されていません</p>';
      }
      document.getElementById('panel-projdoc').innerHTML = pdHtml;
    }

    // --- Pin Editor init ---
    const pinLinkOptions = [
      ...furnitureItems.map(f => ({ type: 'furniture', id: f.id, label: f.name })),
      ...(matData.materials || []).filter(m => (project.material_ids || []).includes(m.id))
        .map(m => ({ type: 'material', id: m.id, label: m.name }))
    ];
    if (pinLinkOptions.length) {
      PinEditor.init('project', projectId, _photoPins, pinLinkOptions);
      _photoPins = PinEditor.loadPins(_photoPins);
      if (photos.length) setMainPhoto(B + photos[0], 0);
      document.getElementById('pin-editor-bar').style.display = '';
    }

    // --- Drawings panel (図面 + 追加/削除UI) ---
    {
      let drawHtml = '';
      if (hasDrawings) {
        drawHtml += '<div class="detail-gallery">' + project.drawings.map((d, i) =>
          `<div class="detail-gallery-item" style="position:relative" onclick="openLightbox('${B}${d.src}')">
            <img src="${B}${d.src}" alt="${esc(d.label || '')}" loading="lazy">
            <div class="img-delete-btn" onclick="event.stopPropagation();WebEditor.removeImage('project_drawing','${projectId}','${d.src}');this.parentElement.remove();">&times;</div>
          </div>`).join('') + '</div>';
      } else {
        drawHtml += '<p style="color:var(--color-tertiary);font-size:13px;padding:16px 0">図面はまだ登録されていません</p>';
      }
      drawHtml += `<div style="margin-top:12px">
        <button onclick="WebEditor.addImageUI('project_drawing','${projectId}',()=>location.reload())" style="padding:6px 14px;font-size:12px;background:var(--color-surface);border:1px dashed var(--color-border);border-radius:4px;cursor:pointer;color:var(--color-secondary)">+ 図面を追加</button>
      </div>`;
      document.getElementById('panel-drawings').innerHTML = drawHtml;
    }

    // --- 3D Model section ---
    ModelManager.render('model-section', 'project', projectId, project.model_url || null, B);

  } catch (e) {
    console.error(e);
    document.querySelector('.detail-container').innerHTML =
      '<p style="padding:40px;color:red">Error: ' + e.message + '</p>';
  }
}

// Called by PinEditor after pin add/delete to refresh pin display
function refreshCurrentPhoto() {
  const photos = [];
  document.querySelectorAll('.detail-photo-thumb[data-src]').forEach(t => {
    photos.push(t.dataset.src);
  });
  if (photos[_currentPhotoIndex]) {
    _photoPins = PinEditor.pins || _photoPins;
    setMainPhoto(photos[_currentPhotoIndex], _currentPhotoIndex);
  }
}

// --- Knowledge Modal ---
function openKnowledgeModal(idx) {
  const k = window._knowledgeData[idx];
  if (!k) return;
  const info = getKnowledgeTypeInfo(k.type);
  const imgs = k.images || [];
  const imgsHtml = imgs.length ? `<div class="know-modal-images">${imgs.map(img => {
    const src = img.startsWith('photos/') ? B + img : img;
    return `<img src="${src}" alt="" onclick="openLightbox('${src}')" loading="lazy">`;
  }).join('')}</div>` : '';
  const modal = document.createElement('div');
  modal.className = 'know-modal-overlay is-open';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `<div class="know-modal">
    <button class="know-modal-close" onclick="this.closest('.know-modal-overlay').remove()">&times;</button>
    <span class="badge badge--${k.type}">${info.label}</span>
    <h2>${esc(k.title)}</h2>
    <div class="know-modal-content">${esc(k.content || '')}</div>
    ${imgsHtml}
    <div class="know-modal-footer">
      <span>${esc(k.posted_by || '')} — ${formatDate(k.date)}</span>
      ${k.slack_url ? '<a href="' + k.slack_url + '" target="_blank" style="color:var(--color-edit-blue)">\u{1F4AC} Slackで見る</a>' : ''}
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function openLightbox(src) {
  if (!src) return;
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('is-open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('is-open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    document.querySelectorAll('.know-modal-overlay').forEach(m => m.remove());
  }
});
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
