<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#f5f4f0"/>
  <!-- Ground shadow -->
  <ellipse cx="400" cy="420" rx="280" ry="30" fill="#e8e6e1"/>
  <!-- Cart body (isometric box) -->
  <path d="M200 200 L400 130 L600 200 L600 350 L400 420 L200 350 Z" fill="#d4c9a8" stroke="#8b6914" stroke-width="1.5"/>
  <path d="M400 130 L400 280 L200 350 L200 200 Z" fill="#c4b998"/>
  <path d="M400 130 L400 280 L600 350 L600 200 Z" fill="#e0d5b5"/>
  <!-- Divider lines -->
  <line x1="300" y1="165" x2="300" y2="315" stroke="#8b6914" stroke-width="0.8" opacity="0.4"/>
  <line x1="500" y1="165" x2="500" y2="315" stroke="#8b6914" stroke-width="0.8" opacity="0.4"/>
  <!-- Sign pole -->
  <rect x="395" y="50" width="10" height="80" fill="#8b6914" rx="2"/>
  <rect x="360" y="40" width="80" height="30" fill="#2d5a27" rx="4"/>
  <text x="400" y="60" font-family="Inter,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="600">BAUM</text>
  <!-- Wheels -->
  <circle cx="250" cy="390" r="25" fill="none" stroke="#666" stroke-width="3"/>
  <circle cx="250" cy="390" r="5" fill="#666"/>
  <circle cx="550" cy="390" r="25" fill="none" stroke="#666" stroke-width="3"/>
  <circle cx="550" cy="390" r="5" fill="#666"/>
  <!-- Label -->
  <text x="400" y="475" font-family="Inter,sans-serif" font-size="11" fill="#999" text-anchor="middle" letter-spacing="2">AXONOMETRIC — PLACEHOLDER</text>
</svg>
